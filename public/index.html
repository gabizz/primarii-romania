<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Găsește UAT - Portal Date Publice</title>
    <!-- Alpine.js -->
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <!-- Inter Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --secondary: #64748b;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            line-height: 1.5;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            color: #0f172a;
            margin-bottom: 0.5rem;
            letter-spacing: -0.025em;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 1.125rem;
        }

        .search-card {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            margin-bottom: 2rem;
            border: 1px solid var(--border);
        }

        .grid-inputs {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #475569;
        }

        .form-group input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            font-size: 1rem;
            transition: all 0.2s;
            box-sizing: border-box;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .search-actions {
            display: flex;
            justify-content: flex-end;
            gap: 1rem;
        }

        button.btn {
            padding: 0.75rem 1.5rem;
            font-weight: 600;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
        }

        .btn-primary {
            background-color: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
        }

        .btn-secondary {
            background-color: #f1f5f9;
            color: #475569;
        }

        .btn-secondary:hover {
            background-color: #e2e8f0;
        }

        .results-info {
            margin-bottom: 1rem;
            font-size: 0.875rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        .table-container {
            background: var(--card-bg);
            border-radius: 1rem;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            overflow: hidden;
            border: 1px solid var(--border);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            background: #f8fafc;
            padding: 1rem;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #64748b;
            border-bottom: 1px solid var(--border);
        }

        td {
            padding: 1rem;
            border-bottom: 1px solid var(--border);
            font-size: 0.875rem;
            vertical-align: top;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover {
            background-color: #f8fafc;
        }

        .badge {
            display: inline-block;
            padding: 0.25rem 0.5rem;
            background: #eff6ff;
            color: #1e40af;
            border-radius: 0.375rem;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-muted);
        }

        @media (max-width: 768px) {
            h1 { font-size: 2rem; }
            .search-card { padding: 1.5rem; }
            .grid-inputs { grid-template-columns: 1fr; }
            .table-container { overflow-x: auto; }
        }
    </style>
</head>
<body x-data="uatApp()">
    <div class="container">
        <header>
            <h1>Găsește UAT</h1>
            <p class="subtitle">Căutare în lista oficială a unităților administrativ-teritoriale</p>
        </header>

        <section class="search-card">
            <form @submit.prevent="search()">
                <div class="grid-inputs">
                    <div class="form-group">
                        <label for="judet">Județ</label>
                        <input type="text" id="judet" x-model="filters.judet" placeholder="Ex: Alba, Cluj...">
                    </div>
                    <div class="form-group">
                        <label for="denumire">Localitate</label>
                        <input type="text" id="denumire" x-model="filters.denumire" placeholder="Nume oraș sau comună...">
                    </div>
                    <div class="form-group">
                        <label for="siruta">SIRUTA</label>
                        <input type="text" id="siruta" x-model="filters.siruta" placeholder="Ex: 1017">
                    </div>
                    <div class="form-group">
                        <label for="cui">CUI (CIF)</label>
                        <input type="text" id="cui" x-model="filters.cui" placeholder="Cod fiscal...">
                    </div>
                </div>
                <div class="search-actions">
                    <button type="button" class="btn btn-secondary" @click="reset()">Resetează</button>
                    <button type="submit" class="btn btn-primary" :disabled="loading">
                        <span x-show="!loading">Caută</span>
                        <span x-show="loading">Se încarcă...</span>
                    </button>
                </div>
            </form>
        </section>

        <div class="results-info" x-show="results.length > 0">
            Am găsit <span x-text="results.length"></span> rezultate
        </div>

        <div class="table-container">
            <template x-if="results.length > 0">
                <table>
                    <thead>
                        <tr>
                            <th>SIRUTA / CUI</th>
                            <th>UAT & Județ</th>
                            <th>Informații Contact</th>
                            <th>Website</th>
                        </tr>
                    </thead>
                    <tbody>
                        <template x-for="item in results" :key="item.SIRUTA">
                            <tr>
                                <td>
                                    <div class="badge" x-text="'SIRUTA: ' + item.SIRUTA"></div>
                                    <div style="margin-top: 0.5rem; font-family: monospace;" x-text="'CUI: ' + (item.cui || 'N/A')"></div>
                                </td>
                                <td>
                                    <div style="font-weight: 700; color: #0f172a;" x-text="item.Localitate"></div>
                                    <div style="color: var(--text-muted); font-size: 0.75rem;" x-text="'Județul ' + item.Judet"></div>
                                </td>
                                <td>
                                    <div x-show="item.Telefon">📞 <span x-text="item.Telefon"></span></div>
                                    <div x-show="item['E-mail general']" style="margin-top: 0.25rem;">
                                        ✉️ <a :href="'mailto:' + item['E-mail general']" class="text-primary" x-text="item['E-mail general']" style="color: var(--primary); text-decoration: none;"></a>
                                    </div>
                                    <div x-show="item.Adresa" style="margin-top: 0.5rem; font-size: 0.75rem; color: var(--text-muted);">
                                        📍 <span x-text="item.Adresa"></span>
                                    </div>
                                </td>
                                <td>
                                    <template x-if="item.Website">
                                        <a :href="item.Website" target="_blank" class="btn btn-secondary" style="font-size: 0.75rem; padding: 0.5rem 1rem; display: inline-block; text-decoration: none;">Vizitează site</a>
                                    </template>
                                    <span x-show="!item.Website" style="color: var(--text-muted); font-style: italic;">Nespecificat</span>
                                </td>
                            </tr>
                        </template>
                    </tbody>
                </table>
            </template>

            <template x-if="results.length === 0 && !loading && searched">
                <div class="empty-state">
                    <p style="font-size: 1.25rem; font-weight: 600; color: #1e293b;">Nu am găsit niciun rezultat</p>
                    <p>Încearcă să schimbi filtrele de căutare.</p>
                </div>
            </template>

            <template x-if="!searched && !loading">
                <div class="empty-state">
                    <p>Introdu date în formularul de mai sus pentru a începe căutarea.</p>
                </div>
            </template>
        </div>
    </div>

    <script>
        function uatApp() {
            return {
                filters: {
                    judet: '',
                    denumire: '',
                    siruta: '',
                    cui: ''
                },
                results: [],
                loading: false,
                searched: false,
                
                async search() {
                    this.loading = true;
                    this.searched = true;
                    
                    const params = new URLSearchParams();
                    if (this.filters.judet) params.append('judet', this.filters.judet);
                    if (this.filters.denumire) params.append('denumire', this.filters.denumire);
                    if (this.filters.siruta) params.append('siruta', this.filters.siruta);
                    if (this.filters.cui) params.append('cui', this.filters.cui);
                    
                    try {
                        const response = await fetch(`/api/uat?${params.toString()}`);
                        this.results = await response.json();
                    } catch (error) {
                        console.error('Căutarea a eșuat:', error);
                        this.results = [];
                    } finally {
                        this.loading = false;
                    }
                },
                
                reset() {
                    this.filters = {
                        judet: '',
                        denumire: '',
                        siruta: '',
                        cui: ''
                    };
                    this.results = [];
                    this.searched = false;
                }
            }
        }
    </script>
</body>
</html>
